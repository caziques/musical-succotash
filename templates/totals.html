<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <title>Inverter Dashboard - Totals</title>
  <style>
    :root { --bg:#0a0e14; --surface:#12171f; --surface2:#181e28; --border:#252b36; --text:#e2e8f0; --muted:#7c8798; --accent:#388bfd; --green:#2ea043; --yellow:#d2991d; --orange:#db6d28; --red:#f85149; --sidebar-w:200px; --font-scale:14px; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; display:flex; min-height:100vh; font-size:var(--font-scale); }
    a { color:var(--accent); text-decoration:none; }

    .sidebar { width:var(--sidebar-w); background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; position:fixed; top:0; left:0; bottom:0; z-index:100; }
    .sidebar-brand { padding:16px 18px 12px; border-bottom:1px solid var(--border); }
    .sidebar-brand h2 { font-size:15px; font-weight:700; color:var(--accent); }
    .sidebar-brand .tagline { font-size:11px; color:var(--muted); margin-top:2px; }
    .sidebar-nav .nav-section { padding:10px 18px 4px; font-size:10px; text-transform:uppercase; letter-spacing:0.8px; color:var(--muted); }
    .sidebar-nav { flex:1; overflow-y:auto; padding:8px 0; }
    .sidebar-nav a { display:flex; align-items:center; gap:9px; padding:8px 18px; font-size:13px; color:var(--muted); border-left:2px solid transparent; transition:all 0.15s; cursor:pointer; text-decoration:none; outline:none; }
    .sidebar-nav a:hover { color:var(--text); background:var(--surface2); }
    .sidebar-nav a:focus { color:var(--text); background:var(--surface2); }
    .sidebar-nav a.active { color:var(--accent); border-left-color:var(--accent); background:var(--surface2); }
    .sidebar-footer { padding:10px 18px; border-top:1px solid var(--border); font-size:11px; color:var(--muted); }

    .main { margin-left:var(--sidebar-w); flex:1; padding:18px 22px; min-width:0; }
    .section-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:8px; }
    .section-header h1 { font-size:20px; font-weight:700; }

    .panel { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:16px 20px; margin-bottom:16px; overflow-x:auto; }
    table { width:100%; border-collapse:collapse; }
    th, td { text-align:right; padding:8px 12px; font-size:13px; border-bottom:1px solid var(--border); white-space:nowrap; }
    th { color:var(--muted); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:0.5px; position:sticky; top:0; background:var(--surface); }
    td:first-child, th:first-child { text-align:left; }
    .total-row td { font-weight:700; border-top:2px solid var(--accent); border-bottom:none; }
    .solar { color:var(--yellow); }
    .grid-import { color:var(--orange); }
    .grid-export { color:var(--green); }
    .batt-charge { color:var(--accent); }

    select { background:var(--surface2); color:var(--text); border:1px solid var(--border); padding:6px 10px; border-radius:6px; font-size:13px; cursor:pointer; }
    .controls { display:flex; gap:8px; align-items:center; }

    .theme-toggle { padding:8px 14px; }
    .theme-toggle button { background:var(--surface2); color:var(--text); border:1px solid var(--border); padding:6px 12px; border-radius:6px; cursor:pointer; font-size:12px; width:100%; }

    [data-theme="light"] { --bg:#f0f2f5; --surface:#ffffff; --surface2:#f7f8fa; --border:#d1d5db; --text:#1f2937; --muted:#6b7280; }
    [data-theme="light"] .panel { border-color:#e5e7eb; }
    [data-font="small"] { --font-scale:12px; }
    [data-font="large"] { --font-scale:16px; }

    @media (max-width:768px) {
      .sidebar { width:52px; } .sidebar-brand h2, .sidebar-nav a span { display:none; }
      .sidebar-nav a { justify-content:center; padding:10px; } .main { margin-left:52px; padding:12px; }
      :root { --sidebar-w:52px; }
    }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-brand"><h2>Inverter</h2><div class="tagline">Dashboard</div></div>
  <nav class="sidebar-nav">
    <a href="/#overview" class="nav-link"><span class="icon">&#9679;</span><span>My Summary</span></a>
    <a href="/#power" class="nav-link"><span class="icon">&#9889;</span><span>Power Flow</span></a>
    <a href="/#battery" class="nav-link"><span class="icon">&#128267;</span><span>Battery</span></a>
    <a href="/#solar" class="nav-link"><span class="icon">&#9728;</span><span>Solar / PV</span></a>
    <a href="/#grid" class="nav-link"><span class="icon">&#127760;</span><span>Grid</span></a>
    <a href="/#energy" class="nav-link"><span class="icon">&#128200;</span><span>Energy & Yield</span></a>
    <a href="/#totals" class="nav-link active"><span class="icon">&#128202;</span><span>Daily Totals</span></a>
    <a href="/#system" class="nav-link"><span class="icon">&#9881;</span><span>System Health</span></a>
    <a href="/#automation" id="navAutomation" class="nav-link" style="display:none"><span class="icon">&#9889;</span><span>Automation</span></a>
    <a href="/settings" id="navSettings" class="nav-link" style="display:none"><span class="icon">&#9881;</span><span>Settings</span></a>
    <a href="/logout" class="nav-link"><span class="icon">&#128682;</span><span>Logout</span></a>
  </nav>
  <div class="theme-toggle">
    <button onclick="toggleTheme()"><span id="themeIcon">&#127761;</span> <span id="themeLabel">Dark</span></button>
  </div>
  <div class="sidebar-footer"><span id="sidebarTime">Totals</span></div>
</aside>

<main class="main">
  <div class="section-header">
    <h1>Daily Totals</h1>
    <div class="controls">
      <label style="font-size:12px;color:var(--muted)">Period:</label>
      <select id="daysSelect" onchange="loadTotals()">
        <option value="30" selected>30 days</option>
        <option value="90">90 days</option>
        <option value="180">180 days</option>
      </select>
    </div>
  </div>

  <div class="panel">
    <table>
      <thead>
        <tr><th>Date</th><th>Load</th><th class="solar">Solar PV</th><th class="batt-charge">Battery Charged</th><th>Battery Discharged</th><th class="grid-import">Grid Used</th><th class="grid-export">Grid Exported</th></tr>
      </thead>
      <tbody id="totalsBody"><tr><td colspan="7" style="text-align:center;color:var(--muted)">Loading...</td></tr></tbody>
    </table>
  </div>
</main>

<script>
async function apiFetch(url) {
  const res = await fetch(url);
  if(res.status === 401) { window.location.href = '/login'; return; }
  return res;
}

async function loadTotals() {
  const days = document.getElementById('daysSelect').value;
  const res = await apiFetch('/api/totals?days=' + days);
  if(!res) return;
  const data = await res.json();

  let html = '';
  let tLoad=0, tSolar=0, tChg=0, tDis=0, tImp=0, tExp=0;

  data.forEach(row => {
    const d = new Date(row.date + 'T00:00:00');
    const dateStr = d.toLocaleDateString([], {day:'2-digit', month:'short', year:'numeric'});
    html += `<tr>
      <td>${dateStr}</td>
      <td>${row.load.toFixed(1)} kWh</td>
      <td class="solar">${row.solar.toFixed(1)} kWh</td>
      <td class="batt-charge">${row.batt_charge.toFixed(1)} kWh</td>
      <td>${row.batt_discharge.toFixed(1)} kWh</td>
      <td class="grid-import">${row.grid_import.toFixed(1)} kWh</td>
      <td class="grid-export">${row.grid_export.toFixed(1)} kWh</td>
    </tr>`;
    tLoad += row.load; tSolar += row.solar; tChg += row.batt_charge;
    tDis += row.batt_discharge; tImp += row.grid_import; tExp += row.grid_export;
  });

  html += `<tr class="total-row">
    <td>TOTAL (${data.length} days)</td>
    <td>${tLoad.toFixed(1)} kWh</td>
    <td class="solar">${tSolar.toFixed(1)} kWh</td>
    <td class="batt-charge">${tChg.toFixed(1)} kWh</td>
    <td>${tDis.toFixed(1)} kWh</td>
    <td class="grid-import">${tImp.toFixed(1)} kWh</td>
    <td class="grid-export">${tExp.toFixed(1)} kWh</td>
  </tr>`;

  document.getElementById('totalsBody').innerHTML = html;
}

function initTheme() {
  if(localStorage.getItem('sunsynk_theme') === 'light') setLight(); else setDark();
}
function toggleTheme() {
  if(document.documentElement.getAttribute('data-theme') === 'light') setDark(); else setLight();
}
function setLight() {
  document.documentElement.setAttribute('data-theme', 'light');
  document.getElementById('themeIcon').innerHTML = '&#127763;';
  document.getElementById('themeLabel').textContent = 'Light';
  localStorage.setItem('sunsynk_theme', 'light');
}
function setDark() {
  document.documentElement.removeAttribute('data-theme');
  document.getElementById('themeIcon').innerHTML = '&#127761;';
  document.getElementById('themeLabel').textContent = 'Dark';
  localStorage.setItem('sunsynk_theme', 'dark');
}
function initFontSize() {
  const sz = localStorage.getItem('sunsynk_font') || 'medium';
  if(sz === 'small') document.documentElement.setAttribute('data-font','small');
  else if(sz === 'large') document.documentElement.setAttribute('data-font','large');
  else document.documentElement.removeAttribute('data-font');
}

initTheme();
initFontSize();
loadTotals();

fetch('/api/me').then(r=>r.json()).then(u => {
  if(u.role === 'admin') {
    document.getElementById('navSettings').style.display = 'flex';
    document.getElementById('navAutomation').style.display = 'flex';
  }
});
</script>
</body>
</html>
