<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inverter Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <style>
    :root {
      --bg: #0a0e14;
      --surface: #12171f;
      --surface2: #181e28;
      --border: #252b36;
      --text: #e2e8f0;
      --muted: #7c8798;
      --accent: #388bfd;
      --green: #2ea043;
      --yellow: #d2991d;
      --orange: #db6d28;
      --red: #f85149;
      --purple: #8b5cf6;
      --sidebar-w: 200px;
      --font-scale: 14px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; display: flex; min-height: 100vh; font-size: var(--font-scale); }
    a { color: var(--accent); text-decoration: none; }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100;
    }
    .sidebar-brand { padding: 16px 18px 12px; border-bottom: 1px solid var(--border); }
    .sidebar-brand h2 { font-size: 15px; font-weight: 700; color: var(--accent); }
    .sidebar-brand .tagline { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .sidebar-nav { flex: 1; overflow-y: auto; padding: 8px 0; }
    .sidebar-nav .nav-section { padding: 10px 18px 4px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); }
    .sidebar-nav a {
      display: flex; align-items: center; gap: 9px; padding: 8px 18px; font-size: 13px;
      color: var(--muted); border-left: 2px solid transparent; transition: all 0.15s; cursor: pointer;
      text-decoration: none; outline: none;
    }
    .sidebar-nav a:hover { color: var(--text); background: var(--surface2); }
    .sidebar-nav a:focus { color: var(--text); background: var(--surface2); }
    .sidebar-nav a.active { color: var(--accent); border-left-color: var(--accent); background: var(--surface2); }
    .sidebar-nav a .icon { width: 18px; text-align: center; font-size: 14px; }
    .sidebar-footer { padding: 10px 18px; border-top: 1px solid var(--border); font-size: 11px; color: var(--muted); }

    /* Main */
    .main { margin-left: var(--sidebar-w); flex: 1; padding: 18px 22px; min-width: 0; }
    .section { display: none; }
    .section.active { display: block; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
    .section-header h1 { font-size: 20px; font-weight: 700; }
    .controls { display: flex; gap: 8px; align-items: center; }
    .controls select, .controls button { background: var(--surface2); color: var(--text); border: 1px solid var(--border); padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; }
    .last-update { font-size: 11px; color: var(--muted); }

    /* Cards */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
    .card h3 { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(155px, 1fr)); gap: 10px; margin-bottom: 14px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; text-align: center; }
    .stat-card .label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px; }
    .stat-card .value { font-size: 26px; font-weight: 700; }
    .stat-card .unit { font-size: 11px; color: var(--muted); }
    .stat-card .sub { font-size: 10px; color: var(--muted); margin-top: 2px; }
    .stat-card.accent { border-color: var(--accent); }
    .stat-card.green { border-color: var(--green); }
    .stat-card.yellow { border-color: var(--yellow); }
    .stat-card.orange { border-color: var(--orange); }

    /* Grid layouts */
    .charts-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(420px, 1fr)); gap: 12px; margin-bottom: 12px; }
    .charts-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(330px, 1fr)); gap: 12px; margin-bottom: 12px; }
    .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
    .chart-card h3 { font-size: 12px; color: var(--muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
    .chart-card canvas { max-height: 260px; }

    /* Executive yield table */
    .yield-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 10px; margin-bottom: 14px; }
    .yield-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
    .yield-card h3 { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
    .yield-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; border-bottom: 1px solid var(--border); }
    .yield-row:last-child { border-bottom: none; }
    .yield-row .key { color: var(--muted); }
    .yield-row .val { font-weight: 600; font-variant-numeric: tabular-nums; }
    .yield-total { font-size: 14px; font-weight: 700; padding-top: 4px; margin-top: 4px; border-top: 1px solid var(--border); }

    /* Energy flow */
    .flow-wrap {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 8px; margin-bottom: 14px; overflow: hidden;
    }
    .flow-line { stroke-dashoffset: 0; }
    .flow-line:nth-child(1) { animation: dash 1.5s linear infinite; }
    .flow-line:nth-child(2) { animation: dash 1.5s linear infinite 0.3s; }
    .flow-line:nth-child(3) { animation: dash 1.5s linear infinite 0.6s; }
    .flow-line:nth-child(4) { animation: dash 1.5s linear infinite 0.9s; }
    @keyframes dash { 0%{stroke-dashoffset:26} 100%{stroke-dashoffset:0} }

    .weather-bar {
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      padding: 10px 16px; margin-bottom: 14px; display: flex; align-items: center;
      gap: 16px; font-size: 13px; flex-wrap: wrap;
    }
    .weather-bar .w-icon { font-size: 28px; }
    .weather-bar .w-temp { font-size: 20px; font-weight: 700; }
    .weather-bar .w-desc { color: var(--muted); text-transform: capitalize; }
    .weather-bar .w-detail { color: var(--muted); font-size: 11px; }
    .weather-bar .w-divider { color: var(--border); }

    .theme-toggle { padding: 8px 14px; }

    @media (max-width: 600px) {
      .flow-wrap { padding: 4px; }
    }

    /* Light theme */
    [data-theme="light"] {
      --bg: #f0f2f5;
      --surface: #ffffff;
      --surface2: #f7f8fa;
      --border: #d1d5db;
      --text: #1f2937;
      --muted: #6b7280;
    }
    [data-theme="light"] .stat-card { border-color: #e5e7eb; }
    [data-theme="light"] .chart-card { border-color: #e5e7eb; }
    [data-theme="light"] .yield-card { border-color: #e5e7eb; }
    [data-theme="light"] .energy-flow-card { border-color: #e5e7eb; }
    [data-theme="light"] .weather-bar { border-color: #e5e7eb; }
    [data-theme="light"] .flow-wrap { border-color: #e5e7eb; }
    [data-theme="light"] .flow-wrap svg text { fill: #374151; }
    [data-theme="light"] .flow-wrap .flow-label { color: #6b7280; }
    [data-theme="light"] .error-msg { background: #fee2e2; color: #991b1b; }
    [data-theme="light"] .flow-wrap svg rect[fill="#12171f"] { fill: #ffffff; stroke: #e5e7eb; }

    [data-font="small"] { --font-scale: 12px; }
    [data-font="large"] { --font-scale: 16px; }

    /* Status indicator */
    .status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; }
    .status-dot.online { background: var(--green); }
    .status-dot.offline { background: var(--red); }

    .error-msg { background: #3d0e0e; border: 1px solid var(--red); border-radius: 8px; padding: 10px 16px; margin-bottom: 14px; display: none; }

    /* flatpickr overrides */
    .flatpickr-calendar { background: var(--surface) !important; border-color: var(--border) !important; }
    .flatpickr-day { color: var(--text) !important; }
    .flatpickr-day.today { border-color: var(--accent) !important; }
    .flatpickr-day.selected, .flatpickr-day.startRange, .flatpickr-day.endRange { background: var(--accent) !important; border-color: var(--accent) !important; }
    .flatpickr-day:hover { background: var(--surface2) !important; }
    .flatpickr-months .flatpickr-month, .flatpickr-current-month .flatpickr-monthDropdown-months { color: var(--text) !important; }
    .flatpickr-weekday { color: var(--muted) !important; }
    .flatpickr-time input { color: var(--text) !important; background: var(--surface2) !important; border-color: var(--border) !important; }
    .flatpickr-time .flatpickr-am-pm { color: var(--muted) !important; }

    @media (max-width: 768px) {
      .sidebar { width: 52px; }
      .sidebar-brand h2, .sidebar-brand .tagline, .sidebar-nav a span, .sidebar-nav .nav-section { display: none; }
      .sidebar-nav a { justify-content: center; padding: 10px; }
      .sidebar-nav a .icon { font-size: 18px; }
      .main { margin-left: 52px; padding: 12px; }
      :root { --sidebar-w: 52px; }
      .charts-2, .charts-3 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-brand">
    <h2>Inverter</h2>
    <div class="tagline">Dashboard</div>
  </div>
  <nav class="sidebar-nav">
    <a class="nav-link active" data-section="overview"><span class="icon">&#9679;</span><span>My Summary</span></a>
    <a class="nav-link" data-section="power"><span class="icon">&#9889;</span><span>Power Flow</span></a>
    <a class="nav-link" data-section="battery"><span class="icon">&#128267;</span><span>Battery</span></a>
    <a class="nav-link" data-section="solar"><span class="icon">&#9728;</span><span>Solar / PV</span></a>
    <a class="nav-link" data-section="grid"><span class="icon">&#127760;</span><span>Grid</span></a>
    <a class="nav-link" data-section="energy"><span class="icon">&#128200;</span><span>Energy & Yield</span></a>
    <a class="nav-link" data-section="totals"><span class="icon">&#128202;</span><span>Daily Totals</span></a>
    <a class="nav-link" data-section="system"><span class="icon">&#9881;</span><span>System Health</span></a>
    <a class="nav-link" data-section="automation" id="navAutomation" style="display:none"><span class="icon">&#9889;</span><span>Automation</span></a>
    <a href="/settings" id="navSettings" class="nav-link" style="display:none"><span class="icon">&#9881;</span><span>Settings</span></a>
    <a href="/logout" class="nav-link"><span class="icon">&#128682;</span><span>Logout</span></a>
  </nav>
  <div class="theme-toggle">
    <button id="themeBtn" onclick="toggleTheme()" style="background:var(--surface2);color:var(--text);border:1px solid var(--border);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;width:100%;text-align:center">
      <span id="themeIcon">&#127761;</span> <span id="themeLabel">Dark</span>
    </button>
  </div>
  <div class="sidebar-footer">
    <span id="sidebarTime">--</span>
  </div>
</aside>

<!-- Main content -->
<main class="main">
  <div class="error-msg" id="errorMsg"></div>
  <div class="section-header">
    <h1 id="sectionTitle">My Summary</h1>
    <div class="controls">
      <label for="dateFrom" style="font-size:12px;color:var(--muted);margin-right:2px">From</label>
      <input type="text" id="dateFrom" placeholder="Select date" style="background:var(--surface2);color:var(--text);border:1px solid var(--border);padding:4px 8px;border-radius:6px;font-size:12px;width:165px;cursor:pointer" readonly>
      <label for="dateTo" style="font-size:12px;color:var(--muted);margin-right:2px">to</label>
      <input type="text" id="dateTo" placeholder="Select date" style="background:var(--surface2);color:var(--text);border:1px solid var(--border);padding:4px 8px;border-radius:6px;font-size:12px;width:165px;cursor:pointer" readonly>
      <button onclick="onDateChange()">Refresh</button>
      <label style="font-size:11px;color:var(--muted);cursor:pointer;user-select:none;display:flex;align-items:center;gap:4px">
        <input type="checkbox" id="yesterdayToggle" onchange="toggleYesterday()" style="cursor:pointer"> Yesterday overlay
      </label>
      <span class="last-update" id="lastUpdate">--</span>
    </div>
  </div>

  <!-- All sections rendered as hidden divs -->

  <div id="content"></div>
</main>

<script>
const COLORS = ['#388bfd','#2ea043','#db6d28','#d2991d','#f85149','#8b5cf6','#2dd4bf','#a78bfa','#fbbf24','#34d399'];
const TIMEZONE = "{{ timezone }}";

apiFetch('/api/me').then(r=>r.json()).then(u => {
  if(u.role === 'admin') {
    document.getElementById('navSettings').style.display = 'flex';
    document.getElementById('navAutomation').style.display = 'flex';
  }
});
let historyData = [];
let yesterdayData = [];
let allCharts = {};
let latestData = null;

async function apiFetch(url) {
  const res = await fetch(url);
  if(res.status === 401) { window.location.href = '/login'; throw new Error('unauthorized'); }
  return res;
}

function fmtHour(ts) { const d=new Date(ts*1000); return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',timeZone:TIMEZONE}); }
function fmtDay(ts) { const d=new Date(ts*1000); return d.toLocaleDateString([],{month:'numeric',day:'numeric',timeZone:TIMEZONE}) + ' ' + d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',timeZone:TIMEZONE}); }
function fmtDate(ts) { const d=new Date(ts*1000); return d.toLocaleDateString([],{month:'numeric',day:'numeric',timeZone:TIMEZONE}); }
function fullTime(ts) { return new Date(ts*1000).toLocaleString([],{timeZone:TIMEZONE}); }
function nowTime() { return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit',timeZone:TIMEZONE}); }

function fmtLabel(ts, spanHours) {
  if(spanHours <= 12) return fmtHour(ts);
  if(spanHours <= 72) return fmtDay(ts);
  return fmtDate(ts);
}

function showError(msg) {
  const el=document.getElementById('errorMsg'); el.style.display='block'; el.textContent=msg;
}
function hideError() { document.getElementById('errorMsg').style.display='none'; }

function v(d,k,scale) { let v=d[k]; if(v==null) return null; return scale ? Math.round(v*scale*100)/100 : v; }

function makeDataset(label, values, idx) {
  return { label, data:values, borderColor:COLORS[idx%COLORS.length], backgroundColor:COLORS[idx%COLORS.length]+'20', borderWidth:1.5, pointRadius:0, tension:0.3, fill:false };
}

function createLineChart(canvasId, title, datasets, labels, yLabel) {
  const canvas = document.getElementById(canvasId);
  if(!canvas) return null;
  if(allCharts[canvasId]) allCharts[canvasId].destroy();
  allCharts[canvasId] = new Chart(canvas, {
    type:'line', data:{labels,datasets},
    options:{
      responsive:true, animation:false, maintainAspectRatio:false,
      plugins:{
        legend:{labels:{color:'#7c8798',boxWidth:12,padding:10,font:{size:11},usePointStyle:true}},
        tooltip:{mode:'index',intersect:false}
      },
      scales:{
        x:{grid:{color:'#1e2430'},ticks:{color:'#7c8798',maxTicksLimit:10,font:{size:10}}},
        y:{grid:{color:'#1e2430'},ticks:{color:'#7c8798',font:{size:10}},title:{display:!!yLabel,text:yLabel||'',color:'#7c8798'}}
      },
      interaction:{mode:'nearest',intersect:false}
    }
  });
  return allCharts[canvasId];
}

function renderSection(section) {
  const content = document.getElementById('content');
  const fromTs = getFromTs();
  const toTs = getToTs();
  const spanHours = (toTs - fromTs) / 3600;
  const labels = historyData.map(r => fmtLabel(r.timestamp, spanHours));

  let html = '';

  if(section === 'overview') {
    const l = latestData || {};
    const pvTotal = (l.pv1_power||0) + (l.pv2_power||0);
    const gridVal = l.grid_power || 0;
    const battVal = l.battery_power || 0;
    const loadVal = l.load_power || 0;
    const soc = l.battery_soc || 0;

    html += `
    <div class="flow-wrap">
      <svg viewBox="0 0 500 360" preserveAspectRatio="xMidYMid meet" style="width:100%;height:auto;max-height:400px">
        <defs>
          <marker id="arrSolar" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
            <path d="M0,0 L6,3 L0,6 Z" fill="#fbbf24"/></marker>
          <marker id="arrGrid" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
            <path d="M0,0 L6,3 L0,6 Z" fill="#60a5fa"/></marker>
          <marker id="arrBatt" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
            <path d="M0,0 L6,3 L0,6 Z" fill="#34d399"/></marker>
          <marker id="arrHome" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
            <path d="M0,0 L6,3 L0,6 Z" fill="#a0aec0"/></marker>
          <filter id="glowS"><feGaussianBlur stdDeviation="2"/></filter>
        </defs>

        <!-- Flow lines -->
        <line x1="110" y1="100" x2="220" y2="158" stroke="#fbbf24" stroke-width="2.5" stroke-dasharray="8,5" opacity="0.6" class="flow-line"/>
        <line x1="280" y1="158" x2="390" y2="100" stroke="#60a5fa" stroke-width="2.5" stroke-dasharray="8,5" opacity="0.6" class="flow-line"/>
        <line x1="220" y1="195" x2="130" y2="260" stroke="#34d399" stroke-width="2.5" stroke-dasharray="8,5" opacity="0.6" class="flow-line"/>
        <line x1="280" y1="195" x2="370" y2="260" stroke="#a0aec0" stroke-width="2.5" stroke-dasharray="8,5" opacity="0.6" class="flow-line"/>

        <!-- Power labels on flow lines -->
        <g font-size="11" font-weight="700" text-anchor="middle">
          <rect x="125" y="118" width="50" height="16" rx="4" fill="#12171f" opacity="0.85"/>
          <text x="150" y="129" fill="#fbbf24">${Math.round(pvTotal)}W</text>
          <rect x="325" y="118" width="50" height="16" rx="4" fill="#12171f" opacity="0.85"/>
          <text x="350" y="129" fill="#60a5fa">${Math.round(Math.abs(gridVal))}W</text>
          <rect x="135" y="248" width="50" height="16" rx="4" fill="#12171f" opacity="0.85"/>
          <text x="160" y="259" fill="#34d399">${Math.round(Math.abs(battVal))}W</text>
          <rect x="305" y="248" width="50" height="16" rx="4" fill="#12171f" opacity="0.85"/>
          <text x="330" y="259" fill="#a0aec0">${Math.round(loadVal)}W</text>
        </g>

        <!-- Animated flow dots -->
        <circle r="3" fill="#fbbf24" opacity="0"><animate attributeName="cx" values="110;220" dur="1.8s" repeatCount="indefinite"/><animate attributeName="cy" values="100;158" dur="1.8s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0" dur="1.8s" repeatCount="indefinite"/></circle>
        <circle r="3" fill="#60a5fa" opacity="0"><animate attributeName="cx" values="280;390" dur="1.8s" begin="0.3s" repeatCount="indefinite"/><animate attributeName="cy" values="158;100" dur="1.8s" begin="0.3s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0" dur="1.8s" begin="0.3s" repeatCount="indefinite"/></circle>
        <circle r="3" fill="#34d399" opacity="0"><animate attributeName="cx" values="220;130" dur="1.8s" begin="0.6s" repeatCount="indefinite"/><animate attributeName="cy" values="195;260" dur="1.8s" begin="0.6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0" dur="1.8s" begin="0.6s" repeatCount="indefinite"/></circle>
        <circle r="3" fill="#a0aec0" opacity="0"><animate attributeName="cx" values="280;370" dur="1.8s" begin="0.9s" repeatCount="indefinite"/><animate attributeName="cy" values="195;260" dur="1.8s" begin="0.9s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0" dur="1.8s" begin="0.9s" repeatCount="indefinite"/></circle>

        <!-- SOLAR -->
        <g transform="translate(50,42)">
          <rect x="0" y="0" width="120" height="90" rx="12" fill="#12171f" stroke="#fbbf24" stroke-width="1" opacity="0.9"/>
          <rect x="44" y="10" width="8" height="12" rx="2" fill="#fbbf24"/>
          <rect x="44" y="32" width="8" height="10" rx="2" fill="#fbbf24"/>
          <rect x="30" y="16" width="12" height="8" rx="2" fill="#fbbf24"/>
          <rect x="54" y="16" width="12" height="8" rx="2" fill="#fbbf24"/>
          <rect x="42" y="16" width="12" height="12" rx="3" fill="#fbbf24"/>
          <circle cx="48" cy="22" r="4" fill="#fef3c7"/>
          <text x="65" y="24" fill="#fbbf24" font-size="18" font-weight="700">${Math.round(pvTotal)}</text>
          <text x="67" y="36" fill="#64748b" font-size="9">W</text>
          <text x="60" y="72" fill="#94a3b8" font-size="11" font-weight="600" text-anchor="middle">SOLAR</text>
        </g>

        <!-- GRID -->
        <g transform="translate(330,42)">
          <rect x="0" y="0" width="120" height="90" rx="12" fill="#12171f" stroke="#60a5fa" stroke-width="1" opacity="0.9"/>
          <path d="M15,18 L36,4 L36,10 L32,10 L28,14 L28,26 L15,26 Z" fill="none" stroke="#60a5fa" stroke-width="2.2" stroke-linejoin="round"/>
          <circle cx="30" cy="10" r="3" fill="#60a5fa"/>
          <text x="65" y="24" fill="${gridVal>=0?'#60a5fa':'#f87171'}" font-size="18" font-weight="700">${Math.round(Math.abs(gridVal))}</text>
          <text x="67" y="36" fill="#64748b" font-size="9">W</text>

function initDatePickers() {
  if(typeof flatpickr === 'undefined') return;
  const now = new Date();
  const yday = new Date(now.getTime() - 86400 * 1000);
  const opts = {
    enableTime: true,
    dateFormat: "Y-m-d H:i",
    time_24hr: true,
    allowInput: false,
    clickOpens: true,
  };
  try {
    flatpickr("#dateFrom", { ...opts, defaultDate: yday, onChange: onDateChange });
    flatpickr("#dateTo", { ...opts, defaultDate: now, onChange: onDateChange });
  } catch(e) {
    // Fallback: set values manually
    const pad = n => String(n).padStart(2,'0');
    const fmt = d => d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'T'+pad(d.getHours())+':'+pad(d.getMinutes());
    document.getElementById('dateFrom').value = fmt(yday);
    document.getElementById('dateTo').value = fmt(now);
  }
}

function getFromTs() {
  const v = document.getElementById('dateFrom').value;
  return v ? (new Date(v).getTime() / 1000) : (Date.now()/1000 - 86400);
}
function getToTs() {
  const v = document.getElementById('dateTo').value;
  return v ? (new Date(v).getTime() / 1000) : (Date.now()/1000);
}

function onDateChange() {
  destroyAllCharts();
  refreshAll();
}

async function refreshAll() {
  const fromTs = getFromTs();
  const toTs = getToTs();
  hideError();
  try {
    const fetches = [
      apiFetch(`/api/history?from=${fromTs}&to=${toTs}`),
      apiFetch('/api/latest'),
      apiFetch('/api/grid-status'),
    ];
    if(document.getElementById('yesterdayToggle').checked) {
      fetches.push(apiFetch(`/api/yesterday?from=${fromTs}&to=${toTs}`));
    }
    const results = await Promise.all(fetches);
    const [histRes, latestRes, gridRes] = results;

    if(!histRes.ok) { showError('No historical data yet.'); return; }
    historyData = await histRes.json();
    if(!historyData.length) { showError('No data collected. Start the reader.'); return; }

    if(latestRes.ok) latestData = await latestRes.json();
    if(gridRes.ok) {
      const gs = await gridRes.json();
      updateOutageTimer(gs);
    }

    yesterdayData = [];
    if(document.getElementById('yesterdayToggle').checked && results.length > 3) {
      const ydRes = results[3];
      if(ydRes.ok) yesterdayData = await ydRes.json();
    }

    document.getElementById('lastUpdate').textContent = 'Last: ' + fullTime(historyData[historyData.length-1].timestamp);
    document.getElementById('sidebarTime').textContent = 'Updated ' + nowTime();
    destroyAllCharts();
    renderSection(currentSection);
    loadWeather();
  } catch(e) {
    showError('Failed: ' + e.message);
  }
}

function toggleYesterday() {
  destroyAllCharts();
  refreshAll();
}

async function loadTotalsData() {
  const days = document.getElementById('totalsDays')?.value || '30';
  try {
    const res = await apiFetch('/api/totals?days=' + days);
    if(!res || !res.ok) return;
    const data = await res.json();
    let html = '', tLoad=0, tSolar=0, tChg=0, tDis=0, tImp=0, tExp=0;
    data.forEach(row => {
      const d = new Date(row.date + 'T00:00:00');
      const ds = d.toLocaleDateString([], {day:'2-digit', month:'short', year:'numeric'});
      html += `<tr>
        <td style="text-align:left;padding:6px 12px;border-bottom:1px solid var(--border)">${ds}</td>
        <td style="text-align:right;padding:6px 12px;border-bottom:1px solid var(--border)">${row.load.toFixed(1)} kWh</td>
        <td style="text-align:right;padding:6px 12px;border-bottom:1px solid var(--border);color:#fbbf24">${row.solar.toFixed(1)} kWh</td>
        <td style="text-align:right;padding:6px 12px;border-bottom:1px solid var(--border);color:var(--accent)">${row.batt_charge.toFixed(1)} kWh</td>
        <td style="text-align:right;padding:6px 12px;border-bottom:1px solid var(--border)">${row.batt_discharge.toFixed(1)} kWh</td>
        <td style="text-align:right;padding:6px 12px;border-bottom:1px solid var(--border);color:#db6d28">${row.grid_import.toFixed(1)} kWh</td>
        <td style="text-align:right;padding:6px 12px;border-bottom:1px solid var(--border);color:var(--green)">${row.grid_export.toFixed(1)} kWh</td>
      </tr>`;
      tLoad+=row.load; tSolar+=row.solar; tChg+=row.batt_charge; tDis+=row.batt_discharge; tImp+=row.grid_import; tExp+=row.grid_export;
    });
    const foot = `<tr style="font-weight:700;border-top:2px solid var(--accent)">
      <td style="padding:6px 12px">TOTAL (${data.length}d)</td>
      <td style="text-align:right;padding:6px 12px">${tLoad.toFixed(1)} kWh</td>
      <td style="text-align:right;padding:6px 12px;color:#fbbf24">${tSolar.toFixed(1)} kWh</td>
      <td style="text-align:right;padding:6px 12px;color:var(--accent)">${tChg.toFixed(1)} kWh</td>
      <td style="text-align:right;padding:6px 12px">${tDis.toFixed(1)} kWh</td>
      <td style="text-align:right;padding:6px 12px;color:#db6d28">${tImp.toFixed(1)} kWh</td>
      <td style="text-align:right;padding:6px 12px;color:var(--green)">${tExp.toFixed(1)} kWh</td>
    </tr>`;
    const body = document.getElementById('totalsBody');
    const footEl = document.getElementById('totalsFoot');
    if(body) body.innerHTML = html;
    if(footEl) footEl.innerHTML = foot;
  } catch(e) {}
}

async function loadAutomationData() {
  try {
    const res = await apiFetch('/api/rules');
    if(!res || !res.ok) return;
    const rules = await res.json();
    const ops = {lt:'&lt;', gt:'&gt;', eq:'='};
    const body = document.getElementById('automationBody');
    if(!body) return;
    if(!rules.length) { body.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:16px">No rules yet. <a href="/automation">Create one</a>.</td></tr>'; return; }
    body.innerHTML = rules.map(r => {
      let t = r.trigger_field.replace(/_/g,' ');
      if(r.trigger_field === 'grid_connected') t += ' = ' + (r.trigger_value?'Off':'On');
      else t += ' ' + (ops[r.trigger_op]||r.trigger_op) + ' ' + r.trigger_value;
      const last = r.last_fired ? new Date(r.last_fired*1000).toLocaleString() : 'Never';
      return `<tr>
        <td style="padding:6px 12px;border-bottom:1px solid var(--border)"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${r.enabled?'var(--green)':'var(--red)'}"></span></td>
        <td style="padding:6px 12px;border-bottom:1px solid var(--border)">${r.name}</td>
        <td style="padding:6px 12px;border-bottom:1px solid var(--border)">${t}</td>
        <td style="padding:6px 12px;border-bottom:1px solid var(--border)">${r.cooldown_seconds}s</td>
        <td style="padding:6px 12px;border-bottom:1px solid var(--border);font-size:11px">${last}</td>
      </tr>`;
    }).join('');
  } catch(e) {}
}

async function loadWeather(force) {
  const bar = document.getElementById('weatherBar');
  if(!bar) return;

  const now = Date.now();
  const CACHE_KEY = 'sunsynk_weather';
  const CACHE_AGE = 10 * 60 * 1000; // 10 minutes

  if(!force) {
    try {
      const cached = JSON.parse(localStorage.getItem(CACHE_KEY));
      if(cached && cached.data && (now - cached.ts < CACHE_AGE)) {
        renderWeather(cached.data);
        return;
      }
    } catch(e) {}
  }

  try {
    const res = await apiFetch('/api/weather');
    if(!res.ok) { bar.innerHTML = cachedFallback(); return; }
    const w = await res.json();
    if(w.error) { bar.innerHTML = cachedFallback(); return; }
    localStorage.setItem(CACHE_KEY, JSON.stringify({ts:now, data:w}));
    renderWeather(w);
  } catch(e) {
    bar.innerHTML = cachedFallback();
  }
}

function cachedFallback() {
  try {
    const cached = JSON.parse(localStorage.getItem('sunsynk_weather'));
    if(cached && cached.data) { renderWeather(cached.data); return cached.data.city||''; }
  } catch(e) {}
  return '';
}

function renderWeather(w) {
  const bar = document.getElementById('weatherBar');
  if(!bar || !w) return;
  const iconUrl = 'https://openweathermap.org/img/wn/' + w.icon + '@2x.png';
  const sunrise = new Date(w.sunrise * 1000).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',timeZone:TIMEZONE});
  const sunset = new Date(w.sunset * 1000).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',timeZone:TIMEZONE});
  bar.innerHTML = '<img src="' + iconUrl + '" width="40" height="40" alt="" style="image-rendering:crisp-edges">' +
    '<span class="w-temp">' + w.temp + '&deg;C</span>' +
    '<span class="w-desc">' + w.description + '</span>' +
    '<span class="w-divider">|</span>' +
    '<span class="w-detail">Feels ' + w.feels_like + '&deg;C</span>' +
    '<span class="w-divider">|</span>' +
    '<span class="w-detail">Humidity ' + w.humidity + '%</span>' +
    '<span class="w-divider">|</span>' +
    '<span class="w-detail">Wind ' + w.wind_speed + ' m/s</span>' +
    '<span class="w-divider">|</span>' +
    '<span class="w-detail">Clouds ' + w.clouds + '%</span>' +
    '<span class="w-divider">|</span>' +
    '<span class="w-detail">&#127748; ' + sunrise + '</span>' +
    '<span class="w-divider">|</span>' +
    '<span class="w-detail">&#127747; ' + sunset + '</span>' +
    '<span class="w-divider">|</span>' +
    '<span class="w-detail">' + w.city + ', ' + w.country + '</span>';
}

let outageTick = null;
function updateOutageTimer(gs) {
  const durEl = document.getElementById('outageDur');
  const estEl = document.getElementById('estRuntime');
  const overlay = document.getElementById('outageOverlay');
  if(!durEl) return;
  if(gs.connected) {
    if(overlay) overlay.setAttribute('visibility', 'hidden');
    if(outageTick) { clearInterval(outageTick); outageTick = null; }
    return;
  }
  if(overlay) overlay.setAttribute('visibility', 'visible');
  function update() {
    const secs = gs.outage_seconds;
    const h = Math.floor(secs/3600), m = Math.floor((secs%3600)/60), s = secs%60;
    durEl.textContent = `${h}h ${m}m ${s}s`;
    const soc = (latestData?.battery_soc || 0);
    const load = (latestData?.load_power || 100);
    const estH = load > 0 ? (soc / 100 * 4800 / load) : 0;
    estEl.textContent = `${estH.toFixed(1)}h`;
  }
  update();
  if(outageTick) clearInterval(outageTick);
  outageTick = setInterval(() => { gs.outage_seconds++; update(); }, 1000);
}

initDatePickers();
initTheme();
initFontSize();

// Handle hash-based navigation from other pages
const hash = window.location.hash.replace('#', '');
const validSections = ['overview','power','battery','solar','grid','energy','totals','automation','system'];
if(hash && validSections.includes(hash)) {
  currentSection = hash;
  document.getElementById('sectionTitle').textContent = 
    document.querySelector(`[data-section="${hash}"]`)?.querySelector('span:last-child')?.textContent || 'My Summary';
  document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
  const nav = document.querySelector(`[data-section="${hash}"]`);
  if(nav) nav.classList.add('active');
}

refreshAll();
loadWeather();
setInterval(refreshAll, 30000);

function initFontSize() {
  const sz = localStorage.getItem('sunsynk_font') || 'medium';
  applyFontSize(sz);
}
function applyFontSize(sz) {
  if(sz === 'small') document.documentElement.setAttribute('data-font','small');
  else if(sz === 'large') document.documentElement.setAttribute('data-font','large');
  else document.documentElement.removeAttribute('data-font');
}

function initTheme() {
  const saved = localStorage.getItem('sunsynk_theme');
  if(saved === 'light') setLight(); else setDark();
}
function toggleTheme() {
  if(document.documentElement.getAttribute('data-theme') === 'light') setDark(); else setLight();
}
function setLight() {
  document.documentElement.setAttribute('data-theme', 'light');
  document.getElementById('themeIcon').innerHTML = '&#127763;';
  document.getElementById('themeLabel').textContent = 'Light';
  localStorage.setItem('sunsynk_theme', 'light');
}
function setDark() {
  document.documentElement.removeAttribute('data-theme');
  document.getElementById('themeIcon').innerHTML = '&#127761;';
  document.getElementById('themeLabel').textContent = 'Dark';
  localStorage.setItem('sunsynk_theme', 'dark');
}
</script>
